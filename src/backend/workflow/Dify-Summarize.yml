    - data:
        code: "# Dify will import the 'List' type hint for you\nfrom typing import\
          \ List, Dict\n\ndef main(keyword: str, rag_results: List[Dict]) -> Dict:\n\
          \    \"\"\"\n    Formats the keyword and its corresponding RAG results into\
          \ a single string.\n\n    Args:\n        keyword (str): The search term\
          \ for the current iteration.\n        rag_results (List[Dict]): The list\
          \ of result objects from the Knowledge Retrieval node.\n               \
          \                   Each object is a dictionary expected to have a 'content'\
          \ key.\n\n    Returns:\n        Dict: A dictionary with a single key \"\
          result\" containing the formatted string.\n    \"\"\"\n    # Start building\
          \ a list of strings. This is more efficient than concatenating.\n    output_parts\
          \ = []\n    \n    # Add the keyword as the title, followed by two newlines\
          \ for spacing.\n    output_parts.append(f\"Keyword: {keyword}\")\n    \n\
          \    # Check if there are any RAG results to process\n    if not rag_results:\n\

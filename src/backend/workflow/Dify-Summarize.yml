    value: 'Eingabe:

      - Folien mit Seitenzahl (Seite x von X)

      - Original Transkript mit Zeitstempel

      - Zusammenfassung

      - Transkript Veredelt


      Erstelle einen One-Pager (so lange er sein muss, aber optimal wäre unter 300-500

      Wörter) nur aus dem Kontext: Lernziele • Kernideen • Schlüssel-Formeln (mit

      Bedingungen) • Fehlerquellen • 3 Übungsfragen (ohne Lösung) • Wichtige ToDos
      und

      Termine • Quellenliste.


      Quellen‑Priorität und Konflikte: Primär: Original Transkript mit Zeitstempel

      (stamped) & Folien (pdf) > Sekundär: Summary.md & Transrkipt Veredelt. Bei

      Widerspruch strikt der Priorität folgen UND Widerspruch aufzeigen.


      Transkript filtern: Aus Transkript nur fachliche Passagen nutzen;

      Orga/Smalltalk, Gruppen/Termine, Meta‑Hinweise ignorieren.


      Nur Zeitbereiche verwenden, die thematisch zu „Fach/Kapitel“ passen.


      Harte Belegpflicht: Jeder Bullet-/Tabellenpunkt MUSS genau eine Quelle tragen

      (Datei + Seite|Timecode).


      Terminologie‑Treue: Bezeichnungen genau wie in den Quellen verwenden.

      '
    value_type: string
